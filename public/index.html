<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VHDH F&B Guide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e4e2dc;
    --text: #1c1c1a;
    --muted: #6e6d68;
    --accent: #1c1c1a;
    --user-bg: #eeecea;
    --radius: 12px;
    --font: 'DM Sans', system-ui, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .shell { width: 100%; max-width: 740px; display: flex; flex-direction: column; height: 92vh; max-height: 840px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .header { padding: 22px 28px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  .header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
  .header p { font-size: 13px; color: var(--muted); padding-left: 20px; }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .msg { max-width: 84%; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; }
  .msg.user { align-self: flex-end; background: var(--user-bg); color: var(--text); border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; white-space: pre-wrap; }
  .msg.assistant.loading { color: var(--muted); font-style: italic; }
  .msg.system { align-self: center; background: none; border: none; color: var(--muted); font-size: 12px; text-align: center; max-width: 100%; padding: 4px 0; }
  .input-area { padding: 18px 28px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; font-family: var(--font); font-size: 14px; line-height: 1.5; padding: 11px 15px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); resize: none; min-height: 46px; max-height: 130px; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: #b0aea8; }
  textarea:disabled { opacity: 0.5; }
  button.send { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 0 22px; font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; height: 46px; transition: opacity 0.15s; flex-shrink: 0; }
  button.send:hover { opacity: 0.82; }
  button.send:disabled { opacity: 0.3; cursor: not-allowed; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: center; }
  @media (max-width: 520px) {
    .shell { height: 100vh; max-height: none; border-radius: 0; border: none; box-shadow: none; }
    .chat-area { padding: 16px; }
    .input-area { padding: 14px 16px; }
    .header { padding: 16px; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-top">
      <div class="logo-dot"></div>
      <h1>VHDH F&amp;B Guide</h1>
    </div>
    <p>Ask anything about the operation — answers come from your manager's handover notes.</p>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="msg system" id="init-msg">Loading...</div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="q-input" placeholder="Ask a question about the operation..." rows="1" onkeydown="handleKey(event)" disabled></textarea>
      <button class="send" id="send-btn" onclick="ask()" disabled>Ask</button>
    </div>
    <div class="hint">Answers are based on your manager's handover notes only.</div>
  </div>
</div>

<script>
let kb = { entries: [], urls: [] };
let chatHistory = [];

async function init() {
  try {
    const res = await fetch('/api/kb');
    if (res.ok) kb = await res.json();
  } catch(e) {}
  const initMsg = document.getElementById('init-msg');
  const hasContent = (kb.entries && kb.entries.length > 0) || (kb.urls && kb.urls.length > 0);
  if (!hasContent) {
    initMsg.textContent = 'No handover notes loaded yet. Check back soon.';
  } else {
    initMsg.textContent = 'Ready — ask me anything about the operation.';
    document.getElementById('q-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
}

async function ask() {
  const input = document.getElementById('q-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMsg('user', q);
  const loadEl = addMsg('assistant loading', 'Searching handover notes...');
  chatHistory.push({ role: 'user', content: q });
  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, history: chatHistory.slice(-10), kb })
    });
    const data = await res.json();
    const answer = data.answer || 'No response received.';
    loadEl.className = 'msg assistant';
    loadEl.textContent = answer;
    chatHistory.push({ role: 'assistant', content: answer });
  } catch(e) {
    loadEl.className = 'msg assistant';
    loadEl.textContent = 'Something went wrong. Please try again.';
  }
  document.getElementById('send-btn').disabled = false;
  scrollBottom();
}

function addMsg(cls, text) {
  const area = document.getElementById('chat-area');
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  area.appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

const ta = document.getElementById('q-input');
ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 130) + 'px'; });

init();
</script>
</body>
</html>
